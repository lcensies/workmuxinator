name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Build .deb ──────────────────────────────────────────────────────────────
  build-deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build deb
        run: make deb VERSION="$VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: workmuxinator_${{ env.VERSION }}_all.deb

  # ── Build .rpm ──────────────────────────────────────────────────────────────
  build-rpm:
    name: Build .rpm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build rpm
        run: make rpm VERSION="$VERSION"

      - name: Locate rpm
        run: echo "RPM_PATH=$(find ~/rpmbuild/RPMS -name '*.rpm' | head -1)" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: ${{ env.RPM_PATH }}

  # ── Build Arch .pkg.tar.zst ─────────────────────────────────────────────────
  build-arch:
    name: Build Arch package
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install base-devel
        run: pacman -Syu --noconfirm base-devel git

      - name: Create build user (makepkg refuses to run as root)
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builder:builder .

      - name: Patch PKGBUILD version
        run: sed -i "s/^pkgver=.*/pkgver=$VERSION/" packaging/arch/PKGBUILD

      - name: Build package
        run: |
          cp packaging/arch/PKGBUILD /tmp/workmuxinator-arch/PKGBUILD
          # Point source to local checkout instead of git remote
          sed -i "s|source=.*|source=(\"workmuxinator-$VERSION::file://$GITHUB_WORKSPACE\")|" \
              /tmp/workmuxinator-arch/PKGBUILD
          sed -i "s/sha256sums=.*/sha256sums=('SKIP')/" /tmp/workmuxinator-arch/PKGBUILD
          su builder -c "cd /tmp/workmuxinator-arch && makepkg -sf --noconfirm"
        shell: bash

      - name: Locate package
        run: echo "PKG_PATH=$(find /tmp/workmuxinator-arch -name '*.pkg.tar.zst' | head -1)" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-pkg
          path: ${{ env.PKG_PATH }}

  # ── Create GitHub Release & attach all packages ─────────────────────────────
  release:
    name: Publish release
    needs: [build-deb, build-rpm, build-arch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List dist
        run: find dist/ -type f | sort

      - name: Create release and attach packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "workmuxinator $GITHUB_REF_NAME" \
            --generate-notes \
            dist/deb/*.deb \
            dist/rpm/*.rpm \
            dist/arch-pkg/*.pkg.tar.zst
